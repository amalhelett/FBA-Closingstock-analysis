<!DOCTYPE html>
<html>
<head>
  <title>FBA + FC Inventory Merge Dashboard</title>

  <!-- CSV Parser -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

  <!-- Excel Parser -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    body { font-family: Arial; padding: 20px; background: #f5f5f5; }

    .card {
      display: inline-block;
      padding: 15px;
      margin: 10px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 20px;
      background: white;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: center;
    }

    th {
      background-color: #333;
      color: white;
    }
  </style>
</head>
<body>

<h2>FBA + FC Inventory Dashboard</h2>

<label>Upload FBA File:</label>
<input type="file" id="fbaFile" accept=".csv"><br><br>

<label>Upload FC File:</label>
<input type="file" id="fcFile" accept=".csv,.xlsx"><br><br>

<button onclick="processFiles()">Process Data</button>
<button onclick="downloadCSV()">Download Merged</button>

<div id="dashboard"></div>

<table>
  <thead>
    <tr>
      <th>SKU</th>
      <th>ASIN</th>
      <th>FC Stock</th>
      <th>FBA Stock</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<script>

// ✅ ASIN Mapping
const asinMap = {
"B0DTNVQ34H": "12x30 HE24 labels",
"B0DTQ3ZCBH": "15X50 HE24 labels",
"B0DXKWKBWQ": "65C Label Roll",
"B0DGF32QRT": "AC1200 Wifi Router",
"B0CQM5THV3": "BT Sound bar",
"B0D9T8R3W8": "H01 Label Holder",
"B0DW8DX2M9": "H30c lite printer",
"B0CJVGCB4K": "H30c printer (New)",
"B0FSSL1Q2X": "H30c printer(Old)",
"B0FKZPDH66": "H30C pro Aiyin",
"B0DL5PXZ65": "H30c pro old (HE480)",
"B0CR75SMCQ": "H41",
"B0CXN44J7J": "H58i mini printer",
"B0FLV3V1W4": "H65C Lite",
"B0FZSJRV5F": "H65C Mini Printer (New Blue)",
"B0FZSCW83R": "H65C Mini Printer (New)",
"B0CZ99K438": "H80i Autocut Thermal Printer",
"B0FL2VFCT9": "HE24 Labell Roll (12x50)",
"B0DDL3TR1L": "HE24 mini printer",
"B0DW8PCP6D": "Helett 4x6 Thermal Label",
"B0D9LS2P2F": "Helett HL96 Hair Dryer",
"B0GDKY6QHN": "Helett infiStick Tv Stick",
"B0G1YY4MJK": "Helett travelfi 4g Hotspot",
"B0DLKM4N5G": "Helett Z567 Tyre Inflator"
};

let finalData = [];

function processFiles() {

  const fbaFile = document.getElementById("fbaFile").files[0];
  const fcFile = document.getElementById("fcFile").files[0];

  if (!fbaFile || !fcFile) {
    alert("Upload both files!");
    return;
  }

  // STEP 1: Parse FBA
  Papa.parse(fbaFile, {
    header: true,
    skipEmptyLines: true,
    complete: function(fbaResults) {

      const fbaData = fbaResults.data;

      const latestDate = fbaData
        .map(r => r["Date"])
        .sort((a,b) => new Date(b) - new Date(a))[0];

      const fbaFiltered = fbaData.filter(r => r["Date"] === latestDate);

      const fbaGrouped = {};

      fbaFiltered.forEach(row => {
        const asin = row["ASIN"];
        const stock = parseFloat(row["Ending Warehouse Balance"]) || 0;

        if (!fbaGrouped[asin]) fbaGrouped[asin] = 0;
        fbaGrouped[asin] += stock;
      });

      // STEP 2: Parse FC (Excel)
      const reader = new FileReader();

      reader.onload = function(e) {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: 'array' });

        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const fcData = XLSX.utils.sheet_to_json(sheet);

        const fcGrouped = {};

        fcData.forEach(row => {

          const asin = row["ASIN"] || row["asin"];
          const stock = parseFloat(row["Closing Stock"] || row["Stock"]) || 0;

          if (!asin) return;

          if (!fcGrouped[asin]) fcGrouped[asin] = 0;
          fcGrouped[asin] += stock;
        });

        // STEP 3: Merge
        const allAsins = new Set([
          ...Object.keys(fbaGrouped),
          ...Object.keys(fcGrouped)
        ]);

        finalData = [];

        allAsins.forEach(asin => {
          finalData.push({
            asin: asin,
            sku: asinMap[asin] || "-",
            fba: fbaGrouped[asin] || 0,
            fc: fcGrouped[asin] || 0
          });
        });

        renderTable(finalData);
        renderDashboard(finalData);
      };

      reader.readAsArrayBuffer(fcFile);
    }
  });
}

// 📊 Table
function renderTable(data) {
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";

  data.forEach(row => {
    tbody.innerHTML += `
      <tr>
        <td>${row.sku}</td>
        <td>${row.asin}</td>
        <td>${row.fc}</td>
        <td>${row.fba}</td>
      </tr>
    `;
  });
}

// 📈 Dashboard
function renderDashboard(data) {
  const totalFC = data.reduce((s, r) => s + r.fc, 0);
  const totalFBA = data.reduce((s, r) => s + r.fba, 0);

  document.getElementById("dashboard").innerHTML = `
    <div class="card">Total FC Stock: <b>${totalFC}</b></div>
    <div class="card">Total FBA Stock: <b>${totalFBA}</b></div>
  `;
}

// ⬇️ Download
function downloadCSV() {
  let csv = "SKU,ASIN,FC Stock,FBA Stock\n";

  finalData.forEach(row => {
    csv += `${row.sku},${row.asin},${row.fc},${row.fba}\n`;
  });

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "merged_inventory.csv";
  a.click();
}

</script>

</body>
</html>
